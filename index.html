<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle of Fifths - Advanced Dashboard</title>
    <style>
        :root {
            --primary-green: #66bb6a;
            --dark-gray: #333;
            --accent-gold: #ffca28;
            --bg-light: #f4f7f6;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 20px; color: var(--dark-gray); }
        .dashboard { display: flex; max-width: 1400px; margin: 0 auto; gap: 20px; }

        /* SIDEBAR SINISTRA */
        .sidebar { width: 350px; display: flex; flex-direction: column; gap: 20px; }
        .side-card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .side-card h3 { margin-top: 0; font-size: 1em; border-bottom: 2px solid var(--primary-green); padding-bottom: 8px; }
        
        .sig-list { font-size: 0.85em; }
        .sig-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .sig-row.active { color: var(--primary-green); font-weight: bold; }
        .sig-notes { color: #cc8e00; font-family: monospace; }

        /* TABELLA MEMO (MODI) */
        .memo-table { width: 100%; border-collapse: collapse; font-size: 0.75em; margin-top: 10px; }
        .memo-table th, .memo-table td { text-align: left; padding: 6px; border-bottom: 1px solid #eee; }
        .memo-table th { color: #888; }

        /* AREA CENTRALE */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .circle-wrapper { position: relative; width: 460px; height: 460px; background: white; border-radius: 50%; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .note-btn {
            position: absolute; width: 74px; height: 74px; margin: -37px;
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; background: var(--primary-green); color: white; border: 4px solid white;
        }
        .note-btn.active { background: var(--dark-gray); transform: scale(1.1); }
        .degree-marker {
            position: absolute; width: 24px; height: 24px; background: var(--accent-gold);
            border-radius: 50%; font-size: 9px; font-weight: bold; color: white;
            display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.5s;
        }

        /* TABELLE ARMONIZZAZIONE */
        .info-card { width: 100%; background: white; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background: #f8f9fa; padding: 12px 20px; font-weight: bold; font-size: 0.9em; display: flex; justify-content: space-between; }
        table.harm-table { width: 100%; border-collapse: collapse; }
        .harm-table th { background: #fafafa; color: #aaa; font-size: 0.7em; padding: 8px; text-transform: uppercase; }
        .harm-table td { padding: 12px; text-align: center; border-top: 1px solid #f0f0f0; font-weight: bold; width: 14.2%; }
        .quad-row { background: #fffcf0; font-size: 0.9em; color: #a57c00; }
        .row-label { font-size: 0.6em; color: #bbb; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <div class="side-card">
            <h3>Tonalità e Alterazioni</h3>
            <div id="sig-list" class="sig-list"></div>
        </div>

        <div class="side-card">
            <h3>Memo: Gradi ed Intervalli</h3>
            <table class="memo-table">
                <thead><tr><th>Gr.</th><th>Accordo</th><th>Intervalli</th></tr></thead>
                <tbody>
                    <tr><td>I</td><td>Maj7</td><td>1, 3M, 5G, 7M</td></tr>
                    <tr><td>ii</td><td>min7</td><td>1, 3m, 5G, 7m</td></tr>
                    <tr><td>iii</td><td>min7</td><td>1, 3m, 5G, 7m</td></tr>
                    <tr><td>IV</td><td>Maj7</td><td>1, 3M, 5G, 7M</td></tr>
                    <tr><td>V</td><td>7 (Dom)</td><td>1, 3M, 5G, 7m</td></tr>
                    <tr><td>vi</td><td>min7</td><td>1, 3m, 5G, 7m</td></tr>
                    <tr><td>vii°</td><td>m7♭5</td><td>1, 3m, 5dim, 7m</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="main-content">
        <div class="circle-wrapper" id="circle">
            <div id="deg-0" class="degree-marker">I</div>
            <div id="deg-1" class="degree-marker">ii</div>
            <div id="deg-2" class="degree-marker">iii</div>
            <div id="deg-3" class="degree-marker">IV</div>
            <div id="deg-4" class="degree-marker">V</div>
            <div id="deg-5" class="degree-marker">vi</div>
            <div id="deg-6" class="degree-marker">vii°</div>
        </div>

        <div class="info-card">
            <div class="card-header"><span id="maj-title">--</span></div>
            <table class="harm-table">
                <thead><tr><th>I</th><th>ii</th><th>iii</th><th>IV</th><th>V</th><th>vi</th><th>vii°</th></tr></thead>
                <tbody>
                    <tr id="maj-triadi"></tr>
                    <tr id="maj-quadriadi" class="quad-row"></tr>
                </tbody>
            </table>
        </div>

        <div class="info-card">
            <div class="card-header"><span id="min-title">--</span></div>
            <table class="harm-table">
                <thead><tr><th>i</th><th>ii°</th><th>III</th><th>iv</th><th>v</th><th>VI</th><th>VII</th></tr></thead>
                <tbody>
                    <tr id="min-triadi"></tr>
                    <tr id="min-quadriadi" class="quad-row"></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const data = [
        { maj: "C", min: "Am", sig: "0", notes: ["C","D","E","F","G","A","B"], alts: "Nessuna" },
        { maj: "G", min: "Em", sig: "1 ♯", notes: ["G","A","B","C","D","E","F♯"], alts: "F♯" },
        { maj: "D", min: "Bm", sig: "2 ♯", notes: ["D","E","F♯","G","A","B","C♯"], alts: "F♯, C♯" },
        { maj: "A", min: "F♯m", sig: "3 ♯", notes: ["A","B","C♯","D","E","F♯","G♯"], alts: "F♯, C♯, G♯" },
        { maj: "E", min: "C♯m", sig: "4 ♯", notes: ["E","F♯","G♯","A","B","C♯","D♯"], alts: "F♯, C♯, G♯, D♯" },
        { maj: "B", min: "G♯m", sig: "5 ♯", notes: ["B","C♯","D♯","E","F♯","G♯","A♯"], alts: "F♯, C♯, G♯, D♯, A♯" },
        { maj: "G♭", min: "E♭m", sig: "6 ♭", notes: ["G♭","A♭","B♭","C♭","D♭","E♭","F"], alts: "B♭, E♭, A♭, D♭, G♭, C♭" },
        { maj: "D♭", min: "B♭m", sig: "5 ♭", notes: ["D♭","E♭","F","G♭","A♭","B♭","C"], alts: "B♭, E♭, A♭, D♭, G♭" },
        { maj: "A♭", min: "Fm", sig: "4 ♭", notes: ["A♭","B♭","C","D♭","E♭","F","G"], alts: "B♭, E♭, A♭, D♭" },
        { maj: "E♭", min: "Cm", sig: "3 ♭", notes: ["E♭","F","G","A♭","B♭","C","D"], alts: "B♭, E♭, A♭" },
        { maj: "B♭", min: "Gm", sig: "2 ♭", notes: ["B♭","C","D","E♭","F","G","A"], alts: "B♭, E♭" },
        { maj: "F", min: "Dm", sig: "1 ♭", notes: ["F","G","A","B♭","C","D","E"], alts: "B♭" }
    ];

    const circle = document.getElementById('circle');
    const sigList = document.getElementById('sig-list');

    // Inizializza UI
    data.forEach((item, i) => {
        const angle = (i * 30 - 90) * (Math.PI / 180);
        const x = 230 + 170 * Math.cos(angle);
        const y = 230 + 170 * Math.sin(angle);

        const btn = document.createElement('div');
        btn.className = 'note-btn';
        btn.style.left = x + 'px'; btn.style.top = y + 'px';
        btn.innerHTML = `<b>${item.maj}</b><small>${item.min}</small>`;
        btn.onclick = () => update(i);
        btn.id = `btn-${i}`;
        circle.appendChild(btn);

        const row = document.createElement('div');
        row.className = 'sig-row';
        row.id = `sig-${i}`;
        row.innerHTML = `<span>${item.maj}</span><span class="sig-notes">${item.alts}</span>`;
        row.onclick = () => update(i);
        sigList.appendChild(row);
    });

    function update(idx) {
        const s = data[idx];
        document.querySelectorAll('.note-btn, .sig-row').forEach(el => el.classList.remove('active'));
        document.getElementById(`btn-${idx}`).classList.add('active');
        document.getElementById(`sig-${idx}`).classList.add('active');

        // Sposta gradi
        const offsets = [0, 2, 4, -1, 1, 3, 5]; 
        offsets.forEach((offset, i) => {
            const pos = (idx + offset + 12) % 12;
            const angle = (pos * 30 - 90) * (Math.PI / 180);
            const r = 120;
            const dot = document.getElementById(`deg-${i}`);
            dot.style.left = (230 + r * Math.cos(angle) - 12) + 'px';
            dot.style.top = (230 + r * Math.sin(angle) - 12) + 'px';
        });

        // Aggiorna Tabelle
        const majT = ["", "m", "m", "", "", "m", "°"];
        const majQ = ["maj7", "m7", "m7", "maj7", "7", "m7", "m7♭5"];
        const minT = ["m", "°", "", "m", "m", "", ""];
        const minQ = ["m7", "m7♭5", "maj7", "m7", "m7", "maj7", "7"];

        document.getElementById('maj-title').innerText = `${s.maj} Maggiore (Note: ${s.alts})`;
        document.getElementById('maj-triadi').innerHTML = s.notes.map((n, i) => `<td><span class="row-label">Triade</span>${n}${majT[i]}</td>`).join('');
        document.getElementById('maj-quadriadi').innerHTML = s.notes.map((n, i) => `<td><span class="row-label">Quadriade</span>${n}${majQ[i]}</td>`).join('');

        const minNotes = [...s.notes.slice(5), ...s.notes.slice(0, 5)];
        document.getElementById('min-title').innerText = `${s.min} Naturale (Note: ${s.alts})`;
        document.getElementById('min-triadi').innerHTML = minNotes.map((n, i) => `<td><span class="row-label">Triade</span>${n}${minT[i]}</td>`).join('');
        document.getElementById('min-quadriadi').innerHTML = minNotes.map((n, i) => `<td><span class="row-label">Quadriade</span>${n}${minQ[i]}</td>`).join('');
    }

    update(0);
</script>
</body>
</html>
